<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang phát - MyMusic</title>
    <style>
        :root { 
            --primary: #1DB954; 
            --bg: #0b0b0b;
            --glass: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: #0a0a0a; color: white; margin: 0; 
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* --- Navbar --- */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
        }
        .nav-links { list-style: none; display: flex; gap: 25px; align-items: center; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #b3b3b3; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .nav-links a:hover { color: white; }
        .active-link { color: white !important; }
        
        .logout-btn { 
            cursor:pointer; background:#282828; padding:6px 18px; 
            border-radius:20px; font-size:16px; color:var(--primary); 
            font-weight: bold; border: 1px solid #444; 
        }

        /* --- Background --- */
        #bg { 
            position: absolute; inset: 0; background-size: cover; background-position: center; 
            filter: blur(60px) brightness(0.3); z-index: -1; 
            transition: 1.2s ease-in-out; transform: scale(1.1); 
        }

        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 60px;
        }

        /* --- Player Card --- */
        .player { 
            text-align: center; width: 90%; max-width: 380px; padding: 35px;
            background: var(--glass); backdrop-filter: blur(25px);
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .disk-wrapper { position: relative; width: 220px; height: 220px; margin: 0 auto 30px; }
        .vinyl-texture { 
            position: absolute; inset: 0; 
            background: repeating-radial-gradient(circle, #181818 0%, #000 2px, #181818 4px); 
            border-radius: 50%; border: 6px solid #222; z-index: 1; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 10px #000;
        }
        #cover { 
            position: absolute; inset: 15%; width: 70%; height: 70%; 
            border-radius: 50%; object-fit: cover; z-index: 2;
            animation: rotate 15s linear infinite; animation-play-state: paused;
        }
        .disk-center { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 16px; height: 16px; background: #111; border-radius: 50%; 
            z-index: 3; border: 3px solid #333; 
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song-info h1 { font-size: 22px; margin: 0 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-info p { color: var(--primary); font-weight: 500; font-size: 15px; margin: 0 0 25px; }

        .progress-container { width: 100%; margin-bottom: 25px; }
        #progress { 
            width: 100%; cursor: pointer; height: 5px; accent-color: var(--primary);
            background: rgba(255,255,255,0.2); border-radius: 10px;
        }
        .time-box { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-top: 10px; }

        /* --- Controls --- */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .btn-func { 
            background: none; border: none; color: white; font-size: 20px; 
            cursor: pointer; transition: 0.3s; opacity: 0.5;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .btn-func:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        
        /* Trạng thái Active cho Shuffle và Repeat */
        .btn-func.active { 
            opacity: 1; 
            color: var(--primary); 
            filter: drop-shadow(0 0 8px var(--primary)); 
        }
        
        #playBtn { 
            background: white; color: black; width: 65px; height: 65px; border-radius: 50%; 
            font-size: 24px; border: none; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        #playBtn:hover { transform: scale(1.1); background: var(--primary); color: white; }

        .volume-box { display: flex; align-items: center; justify-content: center; gap: 10px; opacity: 0.6; transition: 0.3s; }
        .volume-box:hover { opacity: 1; }
        .volume-box input { width: 80px; accent-color: #fff; cursor: pointer; }

        .back-link { margin-top: 25px; color: #888; cursor: pointer; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: 0.3s; display: block; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <nav>
        <h2 onclick="location.href='index.html'" style="cursor:pointer; color: var(--primary); margin: 0; font-size: 26px;">MyMusic</h2>
        <ul class="nav-links">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="trending.html">Thịnh hành</a></li>
            <li><a href="search.html">Tìm kiếm</a></li>
            <li id="auth-link"><a href="signup.html">Đăng ký</a></li>
        </ul>
    </nav>

    <div id="bg"></div>
    
    <div class="main-content">
        <div class="player">
            <div class="disk-wrapper">
                <div class="vinyl-texture"></div>
                <img id="cover" src="" alt="Cover">
                <div class="disk-center"></div>
            </div>
            
            <div class="song-info">
                <h1 id="title">Đang tải...</h1>
                <p id="artist">Nghệ sĩ</p>
            </div>

            <div class="progress-container">
                <input type="range" id="progress" value="0" min="0" max="100">
                <div class="time-box">
                    <span id="currentTime">0:00</span>
                    <span id="durationTime">0:00</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-func" id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
                <button class="btn-func" onclick="change(-1)">⏮</button>
                <button id="playBtn">▶</button>
                <button class="btn-func" onclick="change(1)">⏭</button>
                <button class="btn-func" id="repeatBtn" onclick="toggleRepeat()">🔁</button>
            </div>

            <div class="volume-box">
                <span>🔈</span>
                <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
                <span>🔊</span>
            </div>

            <a class="back-link" onclick="history.back()">← Quay lại danh sách</a>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const progress = document.getElementById('progress');
        const volume = document.getElementById('volume');
        const cover = document.getElementById('cover');
        
        let list = JSON.parse(localStorage.getItem('currentPlaylist')) || [];
        let idx = parseInt(new URLSearchParams(window.location.search).get('index')) || 0;
        
        let isShuffle = false;
        let repeatMode = 0; // 0: No Repeat, 1: Repeat Playlist, 2: Repeat One

        function initNavbar() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                document.getElementById('auth-link').innerHTML = `<div onclick="logout()" class="logout-btn">Đăng xuất</div>`;
            }
        }

        function logout() {
            if(confirm("Bạn muốn đăng xuất?")) {
                localStorage.removeItem('currentUser');
                location.href = 'index.html';
            }
        }

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const min = Math.floor(secs / 60);
            const sec = Math.floor(secs % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function load(i) {
            const s = list[i]; 
            if(!s) return;

            document.getElementById('title').innerText = s.trackName;
            document.getElementById('artist').innerText = s.artistName;
            
            const img = s.artworkUrl100.replace('100x100','800x800');
            cover.src = img;
            document.getElementById('bg').style.backgroundImage = `url(${img})`;
            
            audio.src = s.previewUrl;
            audio.play().catch(() => {
                playBtn.innerHTML = '▶';
                cover.style.animationPlayState = 'paused';
            });
        }

        playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();

        audio.onplay = () => {
            playBtn.innerHTML = '⏸';
            cover.style.animationPlayState = 'running';
        };

        audio.onpause = () => {
            playBtn.innerHTML = '▶';
            cover.style.animationPlayState = 'paused';
        };

        function toggleShuffle() {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
        }

        function toggleRepeat() {
            repeatMode = (repeatMode + 1) % 3;
            // Xử lý giao diện cho từng chế độ
            if (repeatMode === 0) {
                repeatBtn.classList.remove('active');
                repeatBtn.innerHTML = '🔁';
            } else if (repeatMode === 1) {
                repeatBtn.classList.add('active');
                repeatBtn.innerHTML = '🔁'; // Lặp danh sách
            } else {
                repeatBtn.classList.add('active');
                repeatBtn.innerHTML = '🔂'; // Lặp 1 bài
            }
        }

        function change(s) {
            if (isShuffle && s > 0) {
                idx = Math.floor(Math.random() * list.length);
            } else {
                idx = (idx + s + list.length) % list.length;
            }
            load(idx);
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progress.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                document.getElementById('durationTime').innerText = formatTime(audio.duration);
            }
        };

        progress.oninput = () => {
            audio.currentTime = (progress.value / 100) * audio.duration;
        };

        volume.oninput = () => {
            audio.volume = volume.value;
        };

        audio.onended = () => {
            if (repeatMode === 2) {
                // Lặp lại 1 bài
                audio.currentTime = 0;
                audio.play();
            } else if (repeatMode === 1) {
                // Lặp danh sách (tự động qua bài tiếp theo, hết list quay lại bài 1)
                change(1);
            } else {
                // Không lặp: Nếu là bài cuối cùng thì dừng
                if (idx < list.length - 1 || isShuffle) {
                    change(1);
                } else {
                    audio.pause();
                }
            }
        };

        window.onload = () => {
            initNavbar();
            load(idx);
        };
    </script>
</body>
</html>
