<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMusic - Khám phá âm nhạc</title>
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card-bg: #181818; --hover-bg: #282828; }
        
        body { background: var(--bg); color: white; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Navbar tinh chỉnh */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
        .nav-links { list-style: none; display: flex; gap: 25px; align-items: center; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #b3b3b3; font-weight: bold; transition: 0.3s; }
        .nav-links a:hover { color: white; }
        .active { color: white !important; }

        /* Hero Section - Banner sinh động */
        .hero { 
            height: 350px; 
            margin: 20px 5%; 
            border-radius: 15px; 
            background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
        }
        .hero h2 { font-size: 42px; margin: 0; color: var(--primary); }
        .hero p { font-size: 18px; color: #ccc; max-width: 500px; }

        /* Chips - Nhãn tâm trạng */
        .mood-chips { display: flex; gap: 12px; margin: 30px 5%; overflow-x: auto; scrollbar-width: none; }
        .chip { padding: 8px 20px; background: var(--card-bg); border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; white-space: nowrap; border: 1px solid #333; transition: 0.3s; }
        .chip:hover { background: var(--primary); color: black; border-color: var(--primary); }

        main { padding: 0 5% 50px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        /* Grid nhạc */
        #music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 25px; }
        
        /* Card nhạc nâng cấp */
        .card { 
            background: var(--card-bg); 
            padding: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            position: relative;
        }
        .card:hover { background: var(--hover-bg); transform: translateY(-8px); }
        
        .img-container { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 12px; }
        .card img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        /* Nút Play xuất hiện khi hover */
        .play-btn-circle {
            position: absolute; bottom: 8px; right: 8px;
            width: 45px; height: 45px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0; transform: translateY(10px); transition: 0.3s; color: black; font-size: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        .card:hover .play-btn-circle { opacity: 1; transform: translateY(0); }

        .card-title { font-weight: bold; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-artist { color: #b3b3b3; font-size: 14px; margin-top: 5px; }

        /* Logout button */
        .logout-btn { cursor:pointer; background:#282828; padding:6px 18px; border-radius:20px; font-size:14px; color:var(--primary); font-weight: bold; border: 1px solid #444; }
    </style>
</head>
<body>
    <nav>
        <h2 onclick="location.href='home.html'" style="cursor:pointer; color: var(--primary); margin: 0; font-size: 26px;">MyMusic</h2>
        <ul class="nav-links">
            <li><a href="home.html" class="active">Trang chủ</a></li>
            <li><a href="trending.html">Thịnh hành</a></li>
            <li><a href="search.html">Tìm kiếm</a></li>
            <li id="auth-link"><a href="signup.html">Đăng ký</a></li>
        </ul>
    </nav>

    <div class="hero">
        <h2 id="greeting">Chào mừng bạn</h2>
        <p>Khám phá những bản nhạc mới nhất và được cá nhân hóa dành riêng cho gu âm nhạc của bạn.</p>
    </div>

    <div class="mood-chips">
        <div class="chip" onclick="loadHome('lofi')">🌿 Thư giãn</div>
        <div class="chip" onclick="loadHome('workout')">⚡ Năng lượng</div>
        <div class="chip" onclick="loadHome('sad')">🌑 Tâm trạng</div>
        <div class="chip" onclick="loadHome('dance')">💃 Sôi động</div>
        <div class="chip" onclick="loadHome('focus')">📚 Tập trung</div>
        <div class="chip" onclick="loadHome('acoustic')">🎸 Nhẹ nhàng</div>
    </div>

    <main>
        <div class="section-header">
            <h2 style="font-size: 24px;">Dành cho bạn</h2>
            <span style="color: #b3b3b3; font-size: 14px; cursor: pointer;">Xem tất cả</span>
        </div>
        <div id="music-grid">
            </div>
    </main>

    <script>
        async function loadHome(keyword = 'new hits') {
            const grid = document.getElementById('music-grid');
            grid.innerHTML = '<p style="color:gray">Đang tải giai điệu...</p>';

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(keyword)}&limit=30&entity=song&country=vn`);
                const data = await res.json();
                
                // Lọc trùng album
                const unique = [];
                const seen = new Set();
                data.results.forEach(s => {
                    if(!seen.has(s.collectionId) && unique.length < 18) {
                        seen.add(s.collectionId);
                        unique.push(s);
                    }
                });

                localStorage.setItem('currentPlaylist', JSON.stringify(unique));
                
                grid.innerHTML = unique.map((s, i) => `
                    <div class="card" onclick="location.href='player.html?index=${i}'">
                        <div class="img-container">
                            <img src="${s.artworkUrl100.replace('100x100','500x500')}">
                            <div class="play-btn-circle">▶</div>
                        </div>
                        <div class="card-title">${s.trackName}</div>
                        <div class="card-artist">${s.artistName}</div>
                    </div>
                `).join('');
            } catch(e) { 
                grid.innerHTML = "Lỗi kết nối âm nhạc."; 
            }
        }

        // Xử lý thông tin người dùng
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if(user) {
            const hour = new Date().getHours();
            let welcome = "Chào buổi tối";
            if(hour < 12) welcome = "Chào buổi sáng";
            else if(hour < 18) welcome = "Chào buổi chiều";
            
            document.getElementById('greeting').innerText = `${welcome}, ${user.name}`;
            document.getElementById('auth-link').innerHTML = `<div onclick="logout()" class="logout-btn">Đăng xuất</div>`;
        }

        function logout() {
            if(confirm("Bạn muốn đăng xuất?")) {
                localStorage.removeItem('currentUser');
                location.reload();
            }
        }

        window.onload = () => loadHome();
    </script>
</body>
</html>
