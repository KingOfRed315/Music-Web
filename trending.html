<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending - MyMusic</title>
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card-bg: #181818; }
        body { background: var(--bg); color: white; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Navbar tinh tế */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #282828; }
        .nav-links { list-style: none; display: flex; gap: 25px; align-items: center; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #b3b3b3; font-weight: bold; transition: 0.3s; }
        .nav-links a:hover { color: white; }
        .active { color: white !important; }

        /* Banner Top 1 nổi bật */
        .trending-hero { 
            height: 300px; 
            background: linear-gradient(to bottom, #2e2e2e, var(--bg)); 
            display: flex; 
            align-items: flex-end; 
            padding: 40px 10%; 
            gap: 30px;
            border-bottom: 1px solid #333;
        }
        #top1-img { width: 220px; height: 220px; border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: 0.3s; }
        .top1-content h1 { font-size: 72px; margin: 0; letter-spacing: -3px; }
        .top1-content p { color: var(--primary); font-weight: bold; margin: 10px 0; font-size: 18px; }

        main { padding: 40px 10%; }
        
        /* Header bảng xếp hạng */
        .list-header { display: flex; color: #b3b3b3; border-bottom: 1px solid #282828; padding-bottom: 10px; margin-bottom: 20px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .col-rank { width: 60px; text-align: center; }
        .col-title { flex: 1; margin-left: 20px; }

        /* Track Item style mới */
        .track { display: flex; align-items: center; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .track:hover { background: rgba(255,255,255,0.1); }
        
        .rank-num { width: 40px; font-size: 22px; font-weight: 900; color: #b3b3b3; font-style: italic; opacity: 0.5; }
        .track:nth-child(-n+3) .rank-num { color: var(--primary); opacity: 1; font-size: 28px; }

        .track img { width: 45px; height: 45px; border-radius: 4px; margin: 0 20px; object-fit: cover; }
        
        .info { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info b { display: block; font-size: 16px; transition: 0.2s; }
        .track:hover .info b { color: var(--primary); }
        .info span { color: #b3b3b3; font-size: 13px; }

        /* Badge cho Top 3 */
        .status { margin-left: auto; display: flex; align-items: center; gap: 15px; }
        .hot-badge { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .play-icon-small { font-size: 20px; color: var(--primary); opacity: 0; transform: scale(0.5); transition: 0.3s; }
        .track:hover .play-icon-small { opacity: 1; transform: scale(1); }

        /* Logout button */
        .logout-btn { cursor:pointer; background:#282828; padding:6px 15px; border-radius:20px; font-size:13px; color:var(--primary); font-weight:bold; }
    </style>
</head>
<body>
    <nav>
        <h2 onclick="location.href='index.html'" style="cursor:pointer; color: var(--primary); margin: 0; font-size: 26px;">MyMusic</h2>
        <ul class="nav-links">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="trending.html" class="active">Thịnh hành</a></li>
            <li><a href="search.html">Tìm kiếm</a></li>
            <li id="auth-link"><a href="signup.html">Đăng ký</a></li>
        </ul>
    </nav>

    <div class="trending-hero" id="hero-section" style="display:none">
        <img id="top1-img" src="" alt="Top 1">
        <div class="top1-content">
            <p>#1 TRENDING TUẦN NÀY</p>
            <h1 id="top1-title">Loading...</h1>
            <button onclick="playTop1()" style="background:var(--primary); border:none; padding:12px 30px; border-radius:30px; font-weight:bold; cursor:pointer; margin-top:15px">PHÁT NGAY</button>
        </div>
    </div>

    <main>
        <div class="list-header">
            <div class="col-rank">#</div>
            <div class="col-title">Tiêu đề / Nghệ sĩ</div>
        </div>
        <div id="list">
            </div>
    </main>

    <script>
        async function load() {
            // Xử lý Navbar
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) document.getElementById('auth-link').innerHTML = `<span onclick="logout()" class="logout-btn">Thoát</span>`;
            
            try {
                const res = await fetch("https://itunes.apple.com/search?term=vietnam+hits&limit=20&entity=song&country=vn");
                const data = await res.json();
                const songs = data.results;
                localStorage.setItem('currentPlaylist', JSON.stringify(songs));

                // Hiển thị Hero Banner (Top 1)
                if(songs.length > 0) {
                    document.getElementById('hero-section').style.display = 'flex';
                    document.getElementById('top1-img').src = songs[0].artworkUrl100.replace('100x100','600x600');
                    document.getElementById('top1-title').innerText = songs[0].trackName;
                }

                // Hiển thị danh sách
                document.getElementById('list').innerHTML = songs.map((s, i) => `
                    <div class="track" onclick="location.href='player.html?index=${i}'">
                        <div class="rank-num">${i+1}</div>
                        <img src="${s.artworkUrl100}">
                        <div class="info">
                            <b>${s.trackName}</b>
                            <span>${s.artistName}</span>
                        </div>
                        <div class="status">
                            ${i < 3 ? '<span class="hot-badge">HOT</span>' : ''}
                            <span class="play-icon-small">▶</span>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error("Lỗi tải BXH");
            }
        }

        function playTop1() {
            location.href = 'player.html?index=0';
        }

        function logout() {
            if(confirm("Bạn muốn đăng xuất?")) {
                localStorage.removeItem('currentUser');
                location.reload();
            }
        }

        window.onload = load;
    </script>
</body>
</html>
